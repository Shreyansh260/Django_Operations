<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Student Form</h2>
        <form action="#" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label for="name">Student Name:</label>
            <input type="text" id="name" value="{{ up.name }}" name="name" required>

            <label for="class">Class:</label>
            <input type="text" id="class" value="{{ up.student_class }}" name="student_class" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" value="{{ up.age }}" required>

            <label for="photo">Upload Photo:</label>
            <input type="file" id="photo" name="image" value="{{ up.image.url }}" accept="image/*" required>

            <button type="submit">Update</button>
        </form>
    </div>

</body>
</html>
