<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Register</h2>
        <form>
            <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label" name = "first_name">Frist Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">

    <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label" name = "last_name">Last Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">

  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label"name = "username">User Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label" name = "password">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>

<p>Already have a Account.. <a href="/login_page/">Login </a> </p></div>  

  <button type="submit" class="btn btn-primary">Submit</button>
</form>


    </div>
    

</body>
</html>
